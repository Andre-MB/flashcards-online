<div class="count">
  <div class="newDeck">
    <h2>Editar Novo Deck</h2>

    <input type="text" placeholder="Nome do Deck" [(ngModel)]="deckName" />

    <!-- <input type="select" placeholder="Pasta" [(ngModel)]="folderName" /> -->

    <select name="folder" [(ngModel)]="folderName">
      <option value="">Selecione uma Pasta</option>
      <option value="Programação">Programação</option>
      <!-- Adicione mais opções conforme necessário -->
    </select>

    <h3>Flashcards</h3>

    <div class="flashcards">
      @for (card of cards; track $index) {
        <div class="card-form">
          <textarea placeholder="Pergunta" [(ngModel)]="card.question"></textarea>

          <textarea placeholder="Resposta" [(ngModel)]="card.answer"></textarea>

          <button (click)="removeCard($index)">❌</button>
        </div>
      }
    </div>

    <div class="buttons">
      <div class="">
        <button (click)="addCard()">Adicionar Card</button>
        <button class="save" (click)="save()">Salvar Deck</button>
      </div>
    </div>
  </div>
</div>
